mcs.metadata:
  componentName: Rich Actions Demo
  description: Topic demonstrating diverse action types for element-level coverage.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Rich Actions Demo
    triggerQueries:
      - show me rich actions
      - demo all actions

  actions:
    - kind: SetVariable
      id: setVar_01
      variable: Global.UserChoice
      value: =System.Activity.Text

    - actions:
        - activity:
            text:
              - Value: You asked for help. Let me assist you.

          id: sendMessage_help01
          kind: SendActivity

      condition: =Global.UserChoice = "help"
      elseActions:
        - activity:
            text:
              - Value: Processing your request...

          id: sendMessage_other01
          kind: SendActivity

      id: ifCond_01
      kind: IfCondition

    - kind: BeginDialog
      id: beginDialog_01
      dialog: test_allthethings.topic.Greeting

    - kind: EmitEvent
      id: emitEvent_01
      eventName: CustomEvent
      eventValue: =Global.UserChoice

    - kind: SendActivity
      id: sendMessage_final01
      activity: All done!

    - kind: EndDialog
      id: endDialog_01