mcs.metadata:
  componentName: Error Handler
  description: Triggered when an error occurs during conversation execution.
kind: AdaptiveDialog
beginDialog:
  kind: OnError
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_error01
      activity: "Something went wrong. Error code: {Topic.ErrorCode}"

    - kind: SendActivity
      id: sendMessage_error02
      activity: "Details: {Topic.ErrorMessage}"

    - kind: CancelAllDialogs
      id: cancelAllDialogs_error01