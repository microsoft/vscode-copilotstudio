      id: sendActivity_lM88KW
      activity: "Env Var test: {Env.msdyn_SLAWebClientDeprecationAcknowledge  > 100}. The end"

    - kind: SendActivity
      id: sendMessage_abmysR
      activity:
        text:
          - Hello, how can I help you today?{Env.msdyn_SLAWebClientDeprecationAcknowledge}
        speak:
          - Hello, <break strength="medium" /> how can I help?

    - kind: BeginDialog
      id: uWEd54
      dialog: cr924_agentMXECGF.topic.CC_Topic1

    - kind: CancelAllDialogs
      id: cancelAllDialogs_01At22