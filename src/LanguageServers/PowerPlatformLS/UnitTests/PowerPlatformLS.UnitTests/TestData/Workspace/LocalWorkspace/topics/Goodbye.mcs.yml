# Name: Goodbye
# This topic triggers when the user says goodbye. By default, it does not end the conversation. If you would like to end the conversation when the user says goodbye, you can add an "End of Conversation" action to this topic, or redirect to the "End of Conversation" system topic.
kind: AdaptiveDialog
startBehavior: CancelOtherTopics
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Goodbye
    includeInOnSelectIntent: false
    triggerQueries:
      - Bye
      - Bye for now
      - Bye now
      - Good bye
      - No thank you. Goodbye.
      - See you later

  actions:
    - kind: Question
      id: question_zf2HhP
      variable: Topic.EndConversation
      prompt: Would you like to end our conversation?
      entity: BooleanPrebuiltEntity
    
    - kind: SetVariable
      id: setVariable_1
      variable: Topic.Foo
      value: 12345

    - kind: ConditionGroup
      id: condition_DGc1Wy
      conditions:
        - id: condition_DGc1Wy-item-0
          condition: |
            =Topic.EndConversation = 
              (
                Len( /* Length of input string*/ "Hello,
                  World
                  !" /* string inside
                      Len function */) // end of Len function
                    >  456 /* 456 is number */ +             // plus operator
                    12 *               // 12 is number                 
                    /* additional number. */ 523545 
              ) // PowerFx expression       
          actions:
            - kind: BeginDialog
              id: dn94DC
              dialog: cree9_agent.topic.EndofConversation

        - id: condition_DGc1Wy-item-1
          condition: =Topic.EndConversation = /* boolean type */ false     // comment        
          actions:
            - kind: SendActivity
              id: sendMessage_LdLhmf
              activity: Go ahead. I'm listening.